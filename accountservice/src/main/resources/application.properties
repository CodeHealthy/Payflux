spring.application.name=accountservice
server.port=${ACCOUNTSERVICE_PORT:8081}

spring.datasource.url=${ACCOUNTSERVICE_DATASOURCE_URL}
spring.datasource.username=${ACCOUNTSERVICE_DATASOURCE_USERNAME}
spring.datasource.password=${ACCOUNTSERVICE_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${ACCOUNTSERVICE_KAFKA_GROUP_ID:account-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=codehealthy.payflux.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.kafka.topics.account-created=${KAFKA_TOPIC_ACCOUNT_CREATED:account-created}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
logging.pattern.level=%5p [${spring.application.name:unknown},%X{correlationId:-}]
app.kafka.topics.user-registered=${KAFKA_TOPIC_USER_REGISTERED:user-registered}
