spring.datasource.url=jdbc:h2:mem:auditservice-test-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=audit-service

app.jwt.secret=local-test-secret-change-before-production-please-keep-this-long
app.kafka.topics.user-registered=user-registered
app.kafka.topics.beneficiary-added=beneficiary-added
app.kafka.topics.transfer-completed=transfer-completed
app.kafka.topics.admin-wallet-status-changed=admin-wallet-status-changed
