spring.application.name=auditservice
server.port=8087

spring.datasource.url=jdbc:postgresql://localhost:5549/auditdb
spring.datasource.username=payflux
spring.datasource.password=auditAdmin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=audit-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=codehealthy.payflux.*

app.jwt.secret=there-is-a-secret-key-for-jwt-token-generation-in-authservice
app.kafka.topics.user-registered=user-registered
app.kafka.topics.beneficiary-added=beneficiary-added
app.kafka.topics.transfer-completed=transfer-completed
