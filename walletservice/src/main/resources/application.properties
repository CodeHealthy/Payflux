spring.application.name=walletservice
server.port=${WALLETSERVICE_PORT:8083}

spring.datasource.url=${WALLETSERVICE_DATASOURCE_URL}
spring.datasource.username=${WALLETSERVICE_DATASOURCE_USERNAME}
spring.datasource.password=${WALLETSERVICE_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${WALLETSERVICE_KAFKA_GROUP_ID:wallet-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=codehealthy.payflux.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.kafka.topics.account-created=${KAFKA_TOPIC_ACCOUNT_CREATED:account-created}
app.kafka.topics.transfer-completed=${KAFKA_TOPIC_TRANSFER_COMPLETED:transfer-completed}
app.kafka.topics.admin-wallet-status-changed=${KAFKA_TOPIC_ADMIN_WALLET_STATUS_CHANGED:admin-wallet-status-changed}
app.kafka.topics.transfer-otp-requested=${KAFKA_TOPIC_TRANSFER_OTP_REQUESTED:transfer-otp-requested}
app.kafka.topics.audit-events=${KAFKA_TOPIC_AUDIT_EVENTS:audit-events}
app.kafka.topics.transfer-dispute-status-changed=${KAFKA_TOPIC_TRANSFER_DISPUTE_STATUS_CHANGED:transfer-dispute-status-changed}
app.outbox.publish-delay-ms=${WALLET_OUTBOX_PUBLISH_DELAY_MS:3000}
app.transfer.confirmation-ttl-seconds=${TRANSFER_CONFIRMATION_TTL_SECONDS:300}
app.transfer.max-otp-attempts=${TRANSFER_MAX_OTP_ATTEMPTS:3}
app.transfer.idempotency-ttl-seconds=${TRANSFER_IDEMPOTENCY_TTL_SECONDS:86400}
app.transfer.rate-limit.max-confirmations=${TRANSFER_RATE_LIMIT_MAX_CONFIRMATIONS:5}
app.transfer.rate-limit.window-seconds=${TRANSFER_RATE_LIMIT_WINDOW_SECONDS:60}
app.transfer.otp-resend.cooldown-seconds=${TRANSFER_OTP_RESEND_COOLDOWN_SECONDS:30}
app.transfer.otp-resend.window-seconds=${TRANSFER_OTP_RESEND_WINDOW_SECONDS:900}
app.transfer.otp-resend.max-resends=${TRANSFER_OTP_RESEND_MAX_RESENDS:3}
app.transfer.limits.single-transfer-amount=${TRANSFER_LIMIT_SINGLE_AMOUNT:50000.00}
app.transfer.limits.daily-total-amount=${TRANSFER_LIMIT_DAILY_TOTAL_AMOUNT:150000.00}
app.transfer.limits.daily-count=${TRANSFER_LIMIT_DAILY_COUNT:10}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
logging.pattern.level=%5p [${spring.application.name:unknown},%X{correlationId:-}]
