spring.application.name=walletservice
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5545/walletdb
spring.datasource.username=payflux
spring.datasource.password=walletAdmin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=wallet-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=codehealthy.payflux.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.data.redis.host=localhost
spring.data.redis.port=6379

app.jwt.secret=there-is-a-secret-key-for-jwt-token-generation-in-authservice
app.kafka.topics.account-created=account-created
app.kafka.topics.transfer-completed=transfer-completed
app.outbox.publish-delay-ms=3000
app.transfer.confirmation-ttl-seconds=300
app.transfer.max-otp-attempts=3
app.transfer.rate-limit.max-confirmations=5
app.transfer.rate-limit.window-seconds=60
