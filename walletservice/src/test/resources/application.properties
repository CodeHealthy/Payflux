spring.datasource.url=jdbc:h2:mem:walletservice-test-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=wallet-service
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.data.redis.host=localhost
spring.data.redis.port=6379

app.jwt.secret=local-test-secret-change-before-production-please-keep-this-long
app.kafka.topics.account-created=account-created
app.kafka.topics.transfer-completed=transfer-completed
app.outbox.publish-delay-ms=600000
app.transfer.confirmation-ttl-seconds=300
app.transfer.max-otp-attempts=3
app.transfer.idempotency-ttl-seconds=86400
app.transfer.rate-limit.max-confirmations=5
app.transfer.rate-limit.window-seconds=60
