spring.datasource.url=jdbc:h2:mem:beneficiaryservice-test-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.kafka.bootstrap-servers=localhost:9092

app.jwt.secret=local-test-secret-change-before-production-please-keep-this-long
app.kafka.topics.beneficiary-added=beneficiary-added
app.services.account-service.base-url=http://localhost:8081
