spring.application.name=beneficiaryservice
server.port=${BENEFICIARYSERVICE_PORT:8084}

spring.datasource.url=${BENEFICIARYSERVICE_DATASOURCE_URL}
spring.datasource.username=${BENEFICIARYSERVICE_DATASOURCE_USERNAME}
spring.datasource.password=${BENEFICIARYSERVICE_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.kafka.topics.beneficiary-added=${KAFKA_TOPIC_BENEFICIARY_ADDED:beneficiary-added}
app.services.account-service.base-url=${ACCOUNTSERVICE_BASE_URL:http://localhost:8081}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
logging.pattern.level=%5p [${spring.application.name:unknown},%X{correlationId:-}]
