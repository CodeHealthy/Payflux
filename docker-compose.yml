name: payflux

services:
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:4.0.0}
    container_name: ${KAFKA_CONTAINER_NAME:-payflux-kafka}
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://localhost:9092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: ${KAFKA_UI_IMAGE:-provectuslabs/kafka-ui:v0.7.2}
    container_name: ${KAFKA_UI_CONTAINER_NAME:-payflux-kafka-ui}
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_HOST_PORT:-8085}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-payflux-redis}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis-data:/data

  account-db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${ACCOUNT_DB_CONTAINER_NAME:-payflux-account-db}
    ports:
      - "${ACCOUNT_DB_HOST_PORT:-5543}:5432"
    environment:
      POSTGRES_DB: ${ACCOUNT_DB_NAME:?Set ACCOUNT_DB_NAME in .env}
      POSTGRES_USER: ${ACCOUNT_DB_USER:?Set ACCOUNT_DB_USER in .env}
      POSTGRES_PASSWORD: ${ACCOUNT_DB_PASSWORD:?Set ACCOUNT_DB_PASSWORD in .env}
    volumes:
      - account-db-data:/var/lib/postgresql/data

  notification-db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${NOTIFICATION_DB_CONTAINER_NAME:-payflux-notification-db}
    ports:
      - "${NOTIFICATION_DB_HOST_PORT:-5544}:5432"
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:?Set NOTIFICATION_DB_NAME in .env}
      POSTGRES_USER: ${NOTIFICATION_DB_USER:?Set NOTIFICATION_DB_USER in .env}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?Set NOTIFICATION_DB_PASSWORD in .env}
    volumes:
      - notification-db-data:/var/lib/postgresql/data

  wallet-db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${WALLET_DB_CONTAINER_NAME:-payflux-wallet-db}
    ports:
      - "${WALLET_DB_HOST_PORT:-5545}:5432"
    environment:
      POSTGRES_DB: ${WALLET_DB_NAME:?Set WALLET_DB_NAME in .env}
      POSTGRES_USER: ${WALLET_DB_USER:?Set WALLET_DB_USER in .env}
      POSTGRES_PASSWORD: ${WALLET_DB_PASSWORD:?Set WALLET_DB_PASSWORD in .env}
    volumes:
      - wallet-db-data:/var/lib/postgresql/data

  transaction-db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${TRANSACTION_DB_CONTAINER_NAME:-payflux-transaction-db}
    ports:
      - "${TRANSACTION_DB_HOST_PORT:-5548}:5432"
    environment:
      POSTGRES_DB: ${TRANSACTION_DB_NAME:?Set TRANSACTION_DB_NAME in .env}
      POSTGRES_USER: ${TRANSACTION_DB_USER:?Set TRANSACTION_DB_USER in .env}
      POSTGRES_PASSWORD: ${TRANSACTION_DB_PASSWORD:?Set TRANSACTION_DB_PASSWORD in .env}
    volumes:
      - transaction-db-data:/var/lib/postgresql/data

  audit-db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${AUDIT_DB_CONTAINER_NAME:-payflux-audit-db}
    ports:
      - "${AUDIT_DB_HOST_PORT:-5549}:5432"
    environment:
      POSTGRES_DB: ${AUDIT_DB_NAME:?Set AUDIT_DB_NAME in .env}
      POSTGRES_USER: ${AUDIT_DB_USER:?Set AUDIT_DB_USER in .env}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASSWORD:?Set AUDIT_DB_PASSWORD in .env}
    volumes:
      - audit-db-data:/var/lib/postgresql/data

  beneficiary-db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${BENEFICIARY_DB_CONTAINER_NAME:-payflux-beneficiary-db}
    ports:
      - "${BENEFICIARY_DB_HOST_PORT:-5547}:5432"
    environment:
      POSTGRES_DB: ${BENEFICIARY_DB_NAME:?Set BENEFICIARY_DB_NAME in .env}
      POSTGRES_USER: ${BENEFICIARY_DB_USER:?Set BENEFICIARY_DB_USER in .env}
      POSTGRES_PASSWORD: ${BENEFICIARY_DB_PASSWORD:?Set BENEFICIARY_DB_PASSWORD in .env}
    volumes:
      - beneficiary-db-data:/var/lib/postgresql/data

  auth-db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${AUTH_DB_CONTAINER_NAME:-payflux-auth-db}
    ports:
      - "${AUTH_DB_HOST_PORT:-5546}:5432"
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:?Set AUTH_DB_NAME in .env}
      POSTGRES_USER: ${AUTH_DB_USER:?Set AUTH_DB_USER in .env}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?Set AUTH_DB_PASSWORD in .env}
    volumes:
      - auth-db-data:/var/lib/postgresql/data

volumes:
  redis-data:
  account-db-data:
  notification-db-data:
  wallet-db-data:
  transaction-db-data:
  audit-db-data:
  beneficiary-db-data:
  auth-db-data:
