services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: payflux-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: payflux-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  redis:
    image: redis:7.4-alpine
    container_name: payflux-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  account-db:
    image: postgres:16
    container_name: payflux-account-db
    ports:
      - "5543:5432"
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: payflux
      POSTGRES_PASSWORD: accountAdmin
    volumes:
      - account-db-data:/var/lib/postgresql/data

  notification-db:
    image: postgres:16
    container_name: payflux-notification-db
    ports:
      - "5544:5432"
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: payflux
      POSTGRES_PASSWORD: notificationAdmin
    volumes:
      - notification-db-data:/var/lib/postgresql/data

  wallet-db:
    image: postgres:16
    container_name: payflux-wallet-db
    ports:
      - "5545:5432"
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: payflux
      POSTGRES_PASSWORD: walletAdmin
    volumes:
      - wallet-db-data:/var/lib/postgresql/data

  transaction-db:
    image: postgres:16
    container_name: payflux-transaction-db
    ports:
      - "5548:5432"
    environment:
      POSTGRES_DB: transactiondb
      POSTGRES_USER: payflux
      POSTGRES_PASSWORD: transactionAdmin
    volumes:
      - transaction-db-data:/var/lib/postgresql/data

  audit-db:
    image: postgres:16
    container_name: payflux-audit-db
    ports:
      - "5549:5432"
    environment:
      POSTGRES_DB: auditdb
      POSTGRES_USER: payflux
      POSTGRES_PASSWORD: auditAdmin
    volumes:
      - audit-db-data:/var/lib/postgresql/data

  beneficiary-db:
    image: postgres:16
    container_name: payflux-beneficiary-db
    ports:
      - "5547:5432"
    environment:
      POSTGRES_DB: beneficiarydb
      POSTGRES_USER: payflux
      POSTGRES_PASSWORD: beneficiaryAdmin
    volumes:
      - beneficiary-db-data:/var/lib/postgresql/data

  auth-db:
    image: postgres:16
    container_name: payflux-auth-db
    ports:
      - "5546:5432"
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: payflux
      POSTGRES_PASSWORD: authAdmin
    volumes:
      - auth-db-data:/var/lib/postgresql/data

volumes:
  redis-data:
  account-db-data:
  notification-db-data:
  wallet-db-data:
  transaction-db-data:
  audit-db-data:
  beneficiary-db-data:
  auth-db-data:
