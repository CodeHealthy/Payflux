spring.datasource.url=jdbc:h2:mem:authservice-test-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.kafka.bootstrap-servers=localhost:9092

app.jwt.issuer=payflux-authservice-test
app.jwt.access-token-expiration-minutes=30
app.jwt.refresh-token-expiration-days=7
app.jwt.secret=local-test-secret-change-before-production-please-keep-this-long

app.kafka.topics.user-registered=user-registered
