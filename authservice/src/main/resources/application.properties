spring.application.name=authservice
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5546/authdb
spring.datasource.username=payflux
spring.datasource.password=authAdmin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.jwt.issuer=payflux-authservice
app.jwt.access-token-expiration-minutes=30
app.jwt.refresh-token-expiration-days=7
app.jwt.secret=there-is-a-secret-key-for-jwt-token-generation-in-authservice

app.kafka.topics.user-registered=user-registered
