spring.application.name=authservice
server.port=${AUTHSERVICE_PORT:8080}

spring.datasource.url=${AUTHSERVICE_DATASOURCE_URL}
spring.datasource.username=${AUTHSERVICE_DATASOURCE_USERNAME}
spring.datasource.password=${AUTHSERVICE_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

app.jwt.issuer=${JWT_ISSUER:payflux-authservice}
app.jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
app.jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

app.kafka.topics.user-registered=${KAFKA_TOPIC_USER_REGISTERED:user-registered}

app.auth.login.max-email-attempts=${AUTH_LOGIN_MAX_EMAIL_ATTEMPTS:5}
app.auth.login.max-ip-attempts=${AUTH_LOGIN_MAX_IP_ATTEMPTS:20}
app.auth.login.window-seconds=${AUTH_LOGIN_WINDOW_SECONDS:300}
app.auth.login.lockout-seconds=${AUTH_LOGIN_LOCKOUT_SECONDS:900}
app.auth.email-verification.ttl-seconds=${AUTH_EMAIL_VERIFICATION_TTL_SECONDS:600}
app.auth.email-verification.resend-cooldown-seconds=${AUTH_EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:60}
app.auth.email-verification.max-attempts=${AUTH_EMAIL_VERIFICATION_MAX_ATTEMPTS:5}
app.auth.password-reset.ttl-seconds=${AUTH_PASSWORD_RESET_TTL_SECONDS:600}
app.auth.password-reset.resend-cooldown-seconds=${AUTH_PASSWORD_RESET_RESEND_COOLDOWN_SECONDS:60}
app.auth.password-reset.max-attempts=${AUTH_PASSWORD_RESET_MAX_ATTEMPTS:5}
app.email.provider=${APP_EMAIL_PROVIDER:none}
app.email.from=${APP_EMAIL_FROM:no-reply@payflux.local}
app.email.enabled=${APP_EMAIL_ENABLED:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
logging.pattern.level=%5p [${spring.application.name:unknown},%X{correlationId:-}]
