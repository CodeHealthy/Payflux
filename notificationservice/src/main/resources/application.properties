spring.application.name=notificationservice
server.port=${NOTIFICATIONSERVICE_PORT:8082}

spring.datasource.url=${NOTIFICATIONSERVICE_DATASOURCE_URL}
spring.datasource.username=${NOTIFICATIONSERVICE_DATASOURCE_USERNAME}
spring.datasource.password=${NOTIFICATIONSERVICE_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${NOTIFICATIONSERVICE_KAFKA_GROUP_ID:notification-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=codehealthy.payflux.*

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT_MS:5000}

app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.kafka.topics.account-created=${KAFKA_TOPIC_ACCOUNT_CREATED:account-created}
app.kafka.topics.transfer-completed=${KAFKA_TOPIC_TRANSFER_COMPLETED:transfer-completed}
app.kafka.topics.transfer-otp-requested=${KAFKA_TOPIC_TRANSFER_OTP_REQUESTED:transfer-otp-requested}
app.kafka.topics.transfer-dispute-status-changed=${KAFKA_TOPIC_TRANSFER_DISPUTE_STATUS_CHANGED:transfer-dispute-status-changed}
app.email.provider=${APP_EMAIL_PROVIDER:none}
app.email.from=${APP_EMAIL_FROM:no-reply@payflux.local}
app.email.enabled=${APP_EMAIL_ENABLED:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
logging.pattern.level=%5p [${spring.application.name:unknown},%X{correlationId:-}]
