spring.application.name=notificationservice
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5544/notificationdb
spring.datasource.username=payflux
spring.datasource.password=notificationAdmin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=codehealthy.payflux.*

app.jwt.secret=there-is-a-secret-key-for-jwt-token-generation-in-authservice
app.kafka.topics.account-created=account-created
app.kafka.topics.transfer-completed=transfer-completed
