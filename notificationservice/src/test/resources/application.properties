spring.datasource.url=jdbc:h2:mem:notificationservice-test-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service

app.jwt.secret=local-test-secret-change-before-production-please-keep-this-long
app.kafka.topics.account-created=account-created
app.kafka.topics.transfer-completed=transfer-completed
app.kafka.topics.transfer-otp-requested=transfer-otp-requested
app.kafka.topics.transfer-dispute-status-changed=transfer-dispute-status-changed
app.email.provider=none
